<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채널 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --card: #141414; --card2: #1e1e1e; --border: #252525;
    --text: #f0f0f0; --muted: #666; --accent: #ff4444; --accent2: #ffaa00;
    --green: #44ff88; --blue: #4488ff; --purple: #aa44ff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Nanum Gothic',sans-serif; min-height:100vh; padding:24px 16px 80px; }
  header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:12px; }
  header h1 { font-family:'Black Han Sans',sans-serif; font-size:28px; color:var(--accent); letter-spacing:1px; }
  .header-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .refresh-btn { background:var(--accent); color:#fff; border:none; padding:8px 16px; border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-weight:800; font-size:12px; cursor:pointer; transition:opacity 0.2s; }
  .refresh-btn:hover { opacity:0.8; } .refresh-btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* API 설정 */
  .api-setup { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; }
  .api-setup h2 { font-size:13px; font-weight:800; color:var(--accent2); margin-bottom:14px; letter-spacing:1px; }
  .api-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }
  .api-row { display:flex; flex-direction:column; gap:4px; }
  .api-row label { font-size:10px; color:var(--muted); font-weight:700; letter-spacing:1px; }
  .api-row input { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-family:'Space Mono',monospace; font-size:11px; outline:none; transition:border-color 0.2s; }
  .api-row input:focus { border-color:var(--accent2); }
  .gemini-key-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .gemini-key-wrap label { font-size:11px; color:var(--purple); font-weight:800; white-space:nowrap; }
  .gemini-key-wrap input { flex:1; min-width:200px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-family:'Space Mono',monospace; font-size:11px; outline:none; transition:border-color 0.2s; }
  .gemini-key-wrap input:focus { border-color:var(--purple); }

  /* 채널 필터 */
  .filter-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 20px; margin-bottom:24px; }
  .filter-title { font-size:11px; color:var(--muted); font-weight:700; letter-spacing:1px; margin-bottom:12px; }
  .filter-chips { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .chip { display:flex; align-items:center; gap:6px; background:var(--card2); border:1px solid var(--border); border-radius:99px; padding:5px 12px; cursor:pointer; transition:all 0.15s; font-size:12px; font-weight:700; user-select:none; }
  .chip.active { border-color:currentColor; }
  .chip-dot { width:8px; height:8px; border-radius:50%; }
  .chip-all { background:var(--accent); color:#fff; border-color:var(--accent); font-size:11px; }

  /* 요약 */
  .summary-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-bottom:24px; }
  .summary-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; }
  .summary-label { font-size:10px; color:var(--muted); font-weight:700; letter-spacing:1px; margin-bottom:6px; }
  .summary-value { font-family:'Space Mono',monospace; font-size:20px; font-weight:700; color:var(--accent2); }
  .summary-sub { font-size:10px; color:var(--muted); margin-top:2px; }

  /* 채널 카드 */
  .channels-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; margin-bottom:24px; }
  .ch-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:border-color 0.2s; }
  .ch-card:hover { border-color:#333; } .ch-card.monetized { border-color:var(--accent2); }
  .ch-card-header { display:flex; align-items:center; gap:10px; padding:14px 16px 12px; border-bottom:1px solid var(--border); }
  .ch-dot-large { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .ch-name-wrap { flex:1; min-width:0; }
  .ch-name { font-size:14px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ch-account { font-size:10px; color:var(--muted); margin-top:1px; }
  .ch-badge { font-size:10px; padding:3px 8px; border-radius:4px; font-weight:700; flex-shrink:0; }
  .badge-monetized { background:rgba(255,170,0,0.15); color:var(--accent2); }
  .badge-growing { background:rgba(68,255,136,0.1); color:var(--green); }
  .badge-new { background:rgba(68,136,255,0.1); color:var(--blue); }
  .ch-card-body { padding:14px 16px; }

  /* 진행률 */
  .progress-section { margin-bottom:14px; }
  .progress-top { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .progress-label { font-size:11px; color:var(--muted); }
  .progress-nums { font-family:'Space Mono',monospace; font-size:11px; }
  .progress-nums .current { color:var(--text); font-weight:700; }
  .progress-nums .target { color:var(--muted); }
  .bar-bg { height:6px; background:var(--border); border-radius:99px; overflow:hidden; margin-bottom:4px; }
  .bar-fill { height:100%; border-radius:99px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .bar-fill.done { background:var(--accent2); } .bar-fill.near { background:var(--green); }
  .bar-fill.mid { background:var(--blue); } .bar-fill.low { background:var(--accent); }
  .progress-remain { font-size:10px; color:var(--muted); text-align:right; }
  .progress-remain.done { color:var(--accent2); }

  /* 통계 */
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
  .stat-box { background:var(--card2); border-radius:8px; padding:8px 10px; text-align:center; }
  .stat-label { font-size:9px; color:var(--muted); margin-bottom:3px; letter-spacing:0.5px; }
  .stat-value { font-family:'Space Mono',monospace; font-size:13px; font-weight:700; }

  /* 댓글 */
  .comment-section { border-top:1px solid var(--border); padding-top:10px; margin-bottom:10px; }
  .comment-label { font-size:10px; color:var(--muted); font-weight:700; letter-spacing:1px; margin-bottom:8px; }
  .comment-item { background:var(--card2); border-radius:8px; padding:8px 10px; margin-bottom:6px; font-size:11px; line-height:1.5; }
  .comment-author { color:var(--accent2); font-weight:700; margin-bottom:2px; }
  .comment-text { color:#ccc; margin-bottom:6px; }
  .comment-btns { display:flex; gap:6px; flex-wrap:wrap; }
  .comment-link { font-size:10px; color:var(--blue); text-decoration:none; background:rgba(68,136,255,0.1); padding:3px 8px; border-radius:5px; }
  .comment-link:hover { background:rgba(68,136,255,0.2); }
  .reply-gen-btn { font-size:10px; color:var(--purple); background:rgba(170,68,255,0.1); border:none; padding:3px 8px; border-radius:5px; cursor:pointer; font-family:'Nanum Gothic',sans-serif; font-weight:700; transition:all 0.15s; }
  .reply-gen-btn:hover { background:rgba(170,68,255,0.2); }
  .reply-gen-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .reply-options { margin-top:8px; display:flex; flex-direction:column; gap:6px; }
  .reply-option { background:#1a1a2a; border:1px solid #2a2a3a; border-radius:8px; padding:8px 10px; font-size:11px; line-height:1.6; color:#ddd; }
  .reply-option-num { font-size:9px; color:var(--purple); font-weight:700; margin-bottom:3px; }
  .btn-copy-reply { background:rgba(68,255,136,0.1); border:1px solid rgba(68,255,136,0.2); color:var(--green); padding:3px 10px; border-radius:5px; font-size:10px; font-weight:700; cursor:pointer; margin-top:5px; transition:all 0.15s; font-family:'Nanum Gothic',sans-serif; }
  .btn-copy-reply:hover { background:rgba(68,255,136,0.2); }
  .btn-copy-reply.copied { background:var(--green); color:#000; }
  .no-comments { font-size:11px; color:var(--muted); font-style:italic; }

  /* 채널 바로가기 */
  .ch-links { display:flex; gap:8px; padding-top:10px; border-top:1px solid var(--border); flex-wrap:wrap; }
  .ch-link { font-size:11px; text-decoration:none; padding:4px 10px; border-radius:6px; }
  .ch-link-red { color:var(--accent); background:rgba(255,68,68,0.1); }
  .ch-link-gray { color:var(--muted); background:var(--card2); }
  .ch-link-orange { color:var(--accent2); background:rgba(255,170,0,0.1); cursor:pointer; border:none; font-family:'Nanum Gothic',sans-serif; font-weight:700; }
  .ch-link-orange:hover { background:rgba(255,170,0,0.2); }
  .ch-link-orange:disabled { opacity:0.5; cursor:not-allowed; }

  /* 타임라인 섹션 */
  .tool-section { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; }
  .tool-section h2 { font-size:13px; font-weight:800; margin-bottom:14px; letter-spacing:1px; }
  .tool-input-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .tool-input { flex:1; min-width:200px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'Nanum Gothic',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; }
  .tool-input:focus { border-color:var(--blue); }
  .tool-btn { background:var(--blue); color:#fff; border:none; padding:9px 16px; border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-weight:800; font-size:12px; cursor:pointer; white-space:nowrap; transition:opacity 0.2s; }
  .tool-btn:hover { opacity:0.85; } .tool-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .tool-result { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; font-size:11px; color:#ccc; line-height:1.7; white-space:pre-wrap; margin-top:10px; display:none; max-height:300px; overflow-y:auto; }
  .tool-copy-btn { background:rgba(68,136,255,0.15); border:1px solid rgba(68,136,255,0.3); color:var(--blue); padding:6px 14px; border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; margin-top:8px; display:none; font-family:'Nanum Gothic',sans-serif; }
  .tool-copy-btn:hover { background:rgba(68,136,255,0.25); }
  .tool-copy-btn.copied { background:var(--blue); color:#fff; }
  .tool-note { font-size:11px; color:var(--muted); line-height:1.5; }

  /* 메타 개선 섹션 */
  .meta-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
  .meta-row { display:flex; flex-direction:column; gap:4px; }
  .meta-row label { font-size:10px; color:var(--muted); font-weight:700; letter-spacing:1px; }
  .meta-row input, .meta-row textarea, .meta-row select { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:'Nanum Gothic',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; }
  .meta-row textarea { height:70px; resize:vertical; }
  .meta-row input:focus, .meta-row textarea:focus, .meta-row select:focus { border-color:var(--accent2); }
  .meta-btn { background:var(--accent2); color:#111; border:none; padding:10px 20px; border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-weight:800; font-size:13px; cursor:pointer; transition:opacity 0.2s; margin-top:4px; }
  .meta-btn:hover { opacity:0.85; } .meta-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .meta-copy-btn { background:rgba(255,170,0,0.1); border:1px solid rgba(255,170,0,0.2); color:var(--accent2); padding:4px 12px; border-radius:5px; font-size:10px; font-weight:700; cursor:pointer; margin-top:6px; transition:all 0.15s; font-family:'Nanum Gothic',sans-serif; }
  .meta-copy-btn:hover { background:rgba(255,170,0,0.2); }
  .meta-copy-btn.copied { background:var(--accent2); color:#111; }

  /* 메타 개선 - 영상 선택 */
  .video-select-wrap { background:var(--card2); border-radius:10px; padding:12px; margin-bottom:12px; }
  .video-select-label { font-size:10px; color:var(--muted); font-weight:700; margin-bottom:8px; letter-spacing:1px; }
  .video-list { display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; }
  .video-item { display:flex; align-items:center; gap:8px; padding:7px 10px; background:var(--bg); border:1px solid var(--border); border-radius:7px; cursor:pointer; transition:all 0.15s; font-size:12px; }
  .video-item:hover { border-color:var(--accent2); }
  .video-item.selected { border-color:var(--accent2); background:rgba(255,170,0,0.05); }
  .video-thumb { width:50px; height:30px; border-radius:4px; object-fit:cover; background:var(--border); flex-shrink:0; }
  .video-title { flex:1; font-size:11px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .video-views { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); white-space:nowrap; }

  .loading { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
  .loading-spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:8px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-msg { background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.3); border-radius:8px; padding:10px 14px; font-size:12px; color:var(--accent); margin-bottom:10px; }
  .last-updated { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); }
  ::-webkit-scrollbar { display:none; }
</style>
</head>
<body>

<header>
  <div>
    <h1>📺 채널 대시보드</h1>
    <div class="last-updated" id="lastUpdated">마지막 업데이트: -</div>
  </div>
  <div class="header-right">
    <button class="refresh-btn" onclick="loadAll()">🔄 새로고침</button>
  </div>
</header>

<!-- YouTube API 키 설정 -->
<div class="api-setup">
  <h2>🔑 YouTube API 키 설정</h2>
  <div class="api-grid">
    <div class="api-row"><label>shoney222222 (음악카세·쏭터뷰)</label><input type="password" id="key_shoney" placeholder="API 키 입력..." oninput="saveKeys()"></div>
    <div class="api-row"><label>smpl.window (무비카세)</label><input type="password" id="key_smpl" placeholder="API 키 입력..." oninput="saveKeys()"></div>
    <div class="api-row"><label>movieletter.co (디어무비)</label><input type="password" id="key_movie" placeholder="API 키 입력..." oninput="saveKeys()"></div>
    <div class="api-row"><label>sori1004mail (은혜·든든·달빛)</label><input type="password" id="key_sori" placeholder="API 키 입력..." oninput="saveKeys()"></div>
    <div class="api-row"><label>reelpop.co (딜팝·무비하인드·쏭스키친·골든키)</label><input type="password" id="key_reel" placeholder="API 키 입력..." oninput="saveKeys()"></div>
  </div>
</div>

<!-- Gemini API 키 -->
<div class="gemini-key-wrap">
  <label>✨ GEMINI API 키 (답글생성·타임라인·메타개선)</label>
  <input type="password" id="gemini_key" placeholder="Gemini API 키 입력..." oninput="saveGeminiKey()">
</div>

<!-- 채널 필터 -->
<div class="filter-wrap">
  <div class="filter-title">채널 선택</div>
  <div class="filter-chips" id="filterChips"></div>
</div>

<!-- 요약 -->
<div class="summary-grid" id="summaryGrid"></div>

<!-- 채널 카드 -->
<div class="channels-grid" id="channelsGrid">
  <div class="loading">API 키를 입력하고 새로고침을 눌러주세요 😊</div>
</div>

<!-- 타임라인 생성기 -->
<div class="tool-section">
  <h2 style="color:var(--blue)">⏱ 타임라인 생성기</h2>
  <div class="tool-input-row">
    <input class="tool-input" type="text" id="timelineUrl" placeholder="유튜브 영상 URL 입력... https://www.youtube.com/watch?v=...">
    <button class="tool-btn" onclick="generateTimeline()" id="timelineBtn">✨ 타임라인 생성</button>
  </div>
  <div class="tool-note">Gemini가 영상을 직접 분석해서 실제 시간 기반 타임라인을 만들어줘요. 설명란에 바로 붙여넣기 가능!</div>
  <div class="tool-result" id="timelineResult"></div>
  <button class="tool-copy-btn" id="timelineCopyBtn" onclick="copyToolResult('timelineResult','timelineCopyBtn')">📋 타임라인 복사</button>
</div>

<!-- 메타 개선 -->
<div class="tool-section">
  <h2 style="color:var(--accent2)">🔧 제목·설명·해시태그 개선</h2>

  <div class="video-select-wrap">
    <div class="video-select-label">채널 선택 후 영상을 클릭하면 자동으로 정보가 불러와져요</div>
    <div class="tool-input-row" style="margin-bottom:8px;">
      <select class="tool-input" id="meta-channel-select" onchange="loadChannelVideos()" style="flex:0 0 auto;width:160px;">
        <option value="">채널 선택...</option>
        <option value="UCbzKzG-LPzDccqVSAEK2ChQ:smpl">무비카세</option>
        <option value="UCV8oovQ2hUosBi_YbaP6xAg:movie">디어무비</option>
        <option value="UC-kP6g0AiUuXFNGsGpp_1vg:shoney">음악카세</option>
        <option value="UCM_KvFMfB5ieGYn_BT40Y-g:shoney">쏭터뷰</option>
        <option value="UCilcBVgvN2g83hDp8U-dAMQ:sori">든든백세</option>
        <option value="UCIcMm6AH-hyZeDu-jM6HbUQ:sori">은혜여사</option>
        <option value="UCGNSFNe9atBR5w5ic9oOkng:sori">달빛역사관</option>
        <option value="UClTCaR3KMMSx0bSf9KHRsTQ:reel">딜팝</option>
        <option value="UC4f4jRiPzBdQpI4uZUuY4PA:reel">무비하인드</option>
        <option value="UCFxAHsOL3mg7MD013KzbKmA:reel">쏭스키친</option>
        <option value="UCmJot5DCQ33Igbxa-JImLIw:reel">인생골든키</option>
      </select>
      <span style="font-size:11px;color:var(--muted);align-self:center;">최근 영상 목록에서 선택하면 자동 입력</span>
    </div>
    <div class="video-list" id="videoList"><div style="font-size:11px;color:var(--muted);padding:8px;">채널을 선택해주세요</div></div>
  </div>

  <div class="meta-form-grid">
    <div class="meta-row"><label>채널명</label><input type="text" id="meta-channel" placeholder="자동 입력됨"></div>
    <div class="meta-row"><label>현재 조회수</label><input type="number" id="meta-views" placeholder="자동 입력됨"></div>
  </div>
  <div class="meta-row" style="margin-bottom:10px;"><label>현재 제목</label><input type="text" id="meta-title" placeholder="자동 입력됨 또는 직접 입력"></div>
  <div class="meta-row" style="margin-bottom:10px;"><label>현재 설명글</label><textarea id="meta-desc" placeholder="자동 입력됨 또는 직접 입력"></textarea></div>
  <div class="meta-row" style="margin-bottom:10px;"><label>현재 태그/해시태그</label><input type="text" id="meta-tags" placeholder="자동 입력됨 또는 직접 입력"></div>
  <div class="meta-row" style="margin-bottom:10px;"><label>개선 방향 (선택)</label><input type="text" id="meta-reason" placeholder="예: 조회수가 낮음, CTR 개선 필요"></div>
  <button class="meta-btn" onclick="generateMeta()" id="metaBtn">🚀 개선안 생성</button>
  <div class="tool-result" id="metaResult"></div>

// 키 관리
function saveKeys() {
  const keys = {};
  ['shoney','smpl','movie','sori','reel'].forEach(k => {

  });

}
function loadKeys() {
  try {
    const keys = JSON.parse(localStorage.getItem('yt_api_keys') || '{}');
    ['shoney','smpl','movie','sori','reel'].forEach(k => {
      if (keys[k]) document.getElementById('key_'+k).value = keys[k];
    });

function saveGeminiKey() { localStorage.setItem('gemini_key', document.getElementById('gemini_key').value); }
function loadGeminiKey() { const k = localStorage.getItem('gemini_key'); if (k) document.getElementById('gemini_key').value = k; }
function getKey(apiKey) { return document.getElementById('key_'+apiKey)?.value?.trim() || ''; }
function getGeminiKey() { return document.getElementById('gemini_key').value.trim(); }

// Gemini API 호출
async function callGemini(prompt) {
  const key = getGeminiKey();
  if (!key) throw new Error('Gemini API 키를 입력해주세요!');
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${key}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

// 필터
function initFilters() {
  const wrap = document.getElementById('filterChips');
  wrap.innerHTML = '';
  const allChip = document.createElement('div');
  allChip.className = 'chip chip-all';

  allChip.onclick = () => {

    else CHANNELS.forEach(c => activeChannels.add(c.id));
    renderFilters(); renderChannels();
  };
  wrap.appendChild(allChip);
  CHANNELS.forEach(ch => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (activeChannels.has(ch.id) ? ' active' : '');

function renderFilters() {

// 포맷
function fmt(n) {
  if (!n && n !== 0) return '-';
  if (n >= 10000) return (n/10000).toFixed(1)+'만';
  if (n >= 1000) return (n/1000).toFixed(1)+'k';
  return n.toLocaleString();
}
function barClass(pct) {
  if (pct >= 100) return 'done';
  if (pct >= 70) return 'near';
  if (pct >= 30) return 'mid';
  return 'low';
}

// YouTube API
async function fetchChannel(ch) {
  const key = getKey(ch.apiKey);
  if (!key) return null;
  try {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${ch.channelId}&key=${key}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const item = data.items?.[0];
    if (!item) return null;
    return {
      title: item.snippet.title,
      subscribers: parseInt(item.statistics.subscriberCount || 0),
      views: parseInt(item.statistics.viewCount || 0),
      videoCount: parseInt(item.statistics.videoCount || 0),
    };
  } catch(e) { return { error: e.message }; }
}

async function fetchComments(ch) {
  const key = getKey(ch.apiKey);
  if (!key) return [];
  try {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&allThreadsRelatedToChannelId=${ch.channelId}&maxResults=3&order=time&key=${key}`);
    const data = await res.json();
    if (data.error) return [];
    return (data.items || []).map(item => ({
      id: item.snippet.topLevelComment.id,
      author: item.snippet.topLevelComment.snippet.authorDisplayName,
      text: item.snippet.topLevelComment.snippet.textDisplay,
      videoId: item.snippet.topLevelComment.snippet.videoId,
    }));
  } catch { return []; }
}

async function fetchChannelVideos(channelId, apiKeyId) {
  const key = getKey(apiKeyId);
  if (!key) return [];
  try {
    const res = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&order=date&maxResults=10&type=video&key=${key}`);
    const data = await res.json();
    if (data.error) return [];
    const videoIds = (data.items || []).map(i => i.id.videoId).join(',');
    if (!videoIds) return [];
    const statsRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${videoIds}&key=${key}`);
    const statsData = await statsRes.json();
    return (statsData.items || []).map(v => ({
      id: v.id,
      title: v.snippet.title,
      description: v.snippet.description,
      tags: (v.snippet.tags || []).join(' '),
      views: parseInt(v.statistics.viewCount || 0),
      thumbnail: v.snippet.thumbnails?.default?.url || '',
      channelTitle: v.snippet.channelTitle,
    }));
  } catch { return []; }
}

function renderSummary() {

    const d = channelData[ch.id];
    if (d?.info && !d.info.error) {
      totalSubs += d.info.subscribers; totalViews += d.info.views;
      if (d.info.subscribers >= 1000) monetized++; loaded++;
    }
  });
  document.getElementById('summaryGrid').innerHTML = `
    <div class="summary-card"><div class="summary-label">전체 구독자</div><div class="summary-value">${fmt(totalSubs)}</div><div class="summary-sub">${loaded}개 채널 합산</div></div>

}

  grid.innerHTML = visible.map(ch => {
    const d = channelData[ch.id];

    const comments = d.comments || [];

    if (!info) return `<div class="ch-card"><div class="ch-card-header"><div class="ch-dot-large" style="background:${ch.color}"></div><div class="ch-name-wrap"><div class="ch-name" style="color:${ch.color}">${ch.name}</div></div></div><div class="ch-card-body"><div class="error-msg">API 키 없음</div></div></div>`;
    if (info.error) return `<div class="ch-card"><div class="ch-card-header"><div class="ch-dot-large" style="background:${ch.color}"></div><div class="ch-name-wrap"><div class="ch-name" style="color:${ch.color}">${ch.name}</div></div></div><div class="ch-card-body"><div class="error-msg">⚠️ ${info.error}</div></div></div>`;

    const subs = info.subscribers;
    const pct = Math.min(100, Math.round((subs/1000)*100));
    const remain = Math.max(0, 1000-subs);
    const isMonetized = subs >= 1000;
    const badge = isMonetized ? '<span class="ch-badge badge-monetized">💰 수익화</span>' : subs >= 500 ? '<span class="ch-badge badge-growing">📈 성장중</span>' : '<span class="ch-badge badge-new">🌱 초기</span>';

    // 댓글 데이터 전역 저장 (특수문자 문제 방지)
    comments.forEach(c => { window._commentData = window._commentData || {}; window._commentData[c.id] = {author: c.author, text: c.text, channelName: ch.name}; });

    const commentsHTML = comments.length === 0 ? '<div class="no-comments">최근 댓글 없음</div>' : comments.map(c => {
      return `
        <div class="comment-item">
          <div class="comment-author">${c.author}</div>
          <div class="comment-text">${c.text.substring(0,80)}${c.text.length>80?'...':''}</div>
          <div class="comment-btns">
            <a class="comment-link" href="https://www.youtube.com/watch?v=${c.videoId}&lc=${c.id}" target="_blank">🔗 영상으로</a>

          </div>

        </div>`;
    }).join('');

    return `
      <div class="ch-card ${isMonetized?'monetized':''}">
        <div class="ch-card-header">
          <div class="ch-dot-large" style="background:${ch.color}"></div>
          <div class="ch-name-wrap"><div class="ch-name" style="color:${ch.color}">${ch.name}</div><div class="ch-account">${info.title}</div></div>
          ${badge}
        </div>
        <div class="ch-card-body">
          <div class="progress-section">
            <div class="progress-top">
              <span class="progress-label">구독자 1,000명까지</span>
              <span class="progress-nums"><span class="current">${subs.toLocaleString()}</span><span class="target"> / 1,000</span></span>
            </div>
            <div class="bar-bg"><div class="bar-fill ${barClass(pct)}" style="width:${pct}%"></div></div>
            <div class="progress-remain ${isMonetized?'done':''}">${isMonetized?'✅ 수익화 달성!':`${remain.toLocaleString()}명 남음 (${pct}%)`}</div>
          </div>
          <div class="stats-row">
            <div class="stat-box"><div class="stat-label">구독자</div><div class="stat-value" style="color:${ch.color}">${fmt(subs)}</div></div>
            <div class="stat-box"><div class="stat-label">총 조회수</div><div class="stat-value">${fmt(info.views)}</div></div>
            <div class="stat-box"><div class="stat-label">영상 수</div><div class="stat-value">${info.videoCount}</div></div>
          </div>
          <div class="comment-section">
            <div class="comment-label">💬 최근 댓글</div>
            ${commentsHTML}
          </div>
          <div class="ch-links">
            <a class="ch-link ch-link-red" href="https://www.youtube.com/channel/${ch.channelId}" target="_blank">▶ 채널 보기</a>
            <a class="ch-link ch-link-gray" href="https://studio.youtube.com/channel/${ch.channelId}" target="_blank">🎬 스튜디오</a>
          </div>
        </div>
      </div>`;
  }).join('');
  renderSummary();
}

// 답글 생성 (Gemini)
async function generateReplies(commentId) {
  if (!getGeminiKey()) { alert('Gemini API 키를 먼저 입력해주세요!'); return; }
  const data = (window._commentData || {})[commentId];
  if (!data) { alert('댓글 데이터를 찾을 수 없어요. 새로고침 해주세요!'); return; }
  const author = data.author;
  const commentText = data.text;
  const channelName = data.channelName;
  const btn = document.querySelector(`button[onclick*="'${commentId}'"]`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 생성중...'; }
  const container = document.getElementById('replies-'+commentId);
  container.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:6px;">답글 생성 중...</div>';
  try {
    const text = await callGemini(`유튜브 채널 "${channelName}"에 달린 댓글에 대한 답글을 3가지 스타일로 작성해줘.

작성자: ${author}
댓글 내용: ${commentText}

조건:
- 반드시 "${author}님"으로 시작
- 따뜻하고 친근한 한국어 톤
- 각 답글은 2~3문장
- 구독/재방문 유도 포함
- 아래 형식으로 정확히 출력:
[답글1]
내용

[답글2]
내용

[답글3]
내용`);

    const parts = text.split(/\[답글[123]\]/).filter(p => p.trim());
    container.innerHTML = parts.map((r, i) => `
      <div class="reply-option">
        <div class="reply-option-num">답글 ${i+1}</div>
        <div>${r.trim()}</div>
        <button class="btn-copy-reply" onclick="copyReplyText(this, \`${r.trim().replace(/`/g,'').replace(/\n/g,'\\n')}\`)">📋 복사</button>
      </div>`).join('');
  } catch(e) {
    container.innerHTML = '<div class="error-msg">⚠️ ' + e.message + '</div>';
  }
  if (btn) { btn.disabled = false; btn.textContent = '✍️ 답글 생성'; }
}

function copyReplyText(btn, text) {
  navigator.clipboard.writeText(text.replace(/\\n/g,'\n')).then(() => {
    btn.textContent = '✓ 복사됨'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 복사'; btn.classList.remove('copied'); }, 2000);
  });
}

// 복사
function copyToolResult(resultId, btnId) {
  const text = document.getElementById(resultId).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    btn.textContent = '✓ 복사됨!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 복사'; btn.classList.remove('copied'); }, 2000);
  });
}
