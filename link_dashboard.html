<meta charset="UTF-8">

<title>Reel's Hub</title>

<style>
  :root {
    --bg: #111; --card: #1c1c1c; --border: #2a2a2a;
    --text: #f0f0f0; --muted: #666; --accent: #e8ff47; --red: #ff4757;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Nanum Gothic',sans-serif; min-height:100vh; padding:28px 20px 80px; }
  header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:32px; border-bottom:1px solid var(--border); padding-bottom:16px; flex-wrap:wrap; gap:12px; }
  header h1 { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:2px; color:var(--accent); line-height:1; }
  header .sub { font-size:11px; color:var(--muted); font-family:monospace; }
  .add-btn { background:var(--accent); color:#111; border:none; padding:9px 18px; border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-weight:800; font-size:13px; cursor:pointer; transition:opacity 0.2s; }
  .add-btn:hover { opacity:0.85; }
  .category { margin-bottom:28px; }
  .cat-title { font-size:11px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; padding-left:2px; }
  .links-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
  .link-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--text); transition:all 0.18s; position:relative; }
  .link-card:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:0 4px 20px rgba(232,255,71,0.08); }
  .link-card.featured { border-color:rgba(200,169,110,0.4); }
  .link-card.featured:hover { border-color:#c8a96e; box-shadow:0 4px 20px rgba(200,169,110,0.15); }
  .link-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; background:rgba(255,255,255,0.05); }
  .link-info { flex:1; min-width:0; }
  .link-name { font-size:13px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .link-desc { font-size:11px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .badge { display:inline-block; font-size:9px; background:rgba(200,169,110,0.2); color:#c8a96e; border-radius:3px; padding:1px 5px; margin-left:4px; font-weight:800; letter-spacing:0.5px; vertical-align:middle; }
  .delete-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; padding:4px; border-radius:4px; opacity:0; transition:all 0.15s; flex-shrink:0; }
  .link-card:hover .delete-btn { opacity:1; }
  .delete-btn:hover { color:var(--red); background:rgba(255,71,87,0.1); }
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; padding:20px; }
  .modal-bg.open { display:flex; }
  .modal { background:#1e1e1e; border:1px solid var(--border); border-radius:16px; padding:28px; width:100%; max-width:420px; }
  .modal h2 { font-size:16px; font-weight:800; margin-bottom:20px; color:var(--accent); }
  .form-row { margin-bottom:14px; }
  .form-row label { display:block; font-size:11px; color:var(--muted); margin-bottom:6px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
  .form-row input, .form-row select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-family:'Nanum Gothic',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s; }
  .form-row input:focus, .form-row select:focus { border-color:var(--accent); }
  .form-row select option { background:#1e1e1e; }
  .modal-btns { display:flex; gap:10px; margin-top:20px; }
  .btn-save { flex:1; background:var(--accent); color:#111; border:none; padding:11px; border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-weight:800; font-size:13px; cursor:pointer; }
  .btn-cancel { background:var(--card); color:var(--muted); border:1px solid var(--border); padding:11px 18px; border-radius:8px; font-family:'Nanum Gothic',sans-serif; font-size:13px; cursor:pointer; }
</style>
</head>

  {id:'kakao_bot',name:'카카오 챗봇 관리',url:'https://chatbot.kakao.com',desc:'카카오 챗봇 빌더',icon:'🤖',cat:'사주',color:'#2a2a1a'},
  {id:'naver',name:'네이버',url:'https://www.naver.com',desc:'네이버 메인',icon:'🟢',cat:'사주',color:'#1a2a1a'},
];

function loadLinks() {
  try {
    const s = localStorage.getItem('reelLinks_v3');
    return s ? JSON.parse(s) : DEFAULT_LINKS;
  } catch { return DEFAULT_LINKS; }
}
function saveLinks(links) { localStorage.setItem('reelLinks_v3', JSON.stringify(links)); }
let links = loadLinks();

function render() {
  const dash = document.getElementById('dashboard');
  dash.innerHTML = '';
  CAT_ORDER.forEach(cat => {
    const catLinks = links.filter(l => l.cat === cat);
    if (catLinks.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'category';
    const grid = document.createElement('div');
    grid.className = 'links-grid';
    catLinks.forEach(link => {
      const card = document.createElement('a');
      card.href = link.url;
      card.target = link.url.startsWith('http') ? '_blank' : '_self';
      card.className = 'link-card' + (link.featured ? ' featured' : '');
      card.style.background = link.color || '#1c1c1c';
      card.innerHTML = `
        <div class="link-icon">${link.icon||'🔗'}</div>
        <div class="link-info">
          <div class="link-name">${link.name}${link.featured ? '<span class="badge">NEW</span>' : ''}</div>
          <div class="link-desc">${link.desc||''}</div>
        </div>
        <button class="delete-btn" onclick="deleteLink(event,'${link.id}')">✕</button>`;
      grid.appendChild(card);
    });
    sec.innerHTML = `<div class="cat-title">${cat}</div>`;
    sec.appendChild(grid);
    dash.appendChild(sec);
  });
}

function deleteLink(e, id) {
  e.preventDefault(); e.stopPropagation();
  if (confirm('이 링크를 삭제할까요?')) {
    links = links.filter(l => l.id !== id);
    saveLinks(links); render();
  }
}

function openModal() { document.getElementById('modalBg').classList.add('open'); document.getElementById('inp-name').focus(); }
function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  ['inp-name','inp-url','inp-desc','inp-icon'].forEach(id => { document.getElementById(id).value = ''; });
}

function saveLink() {
  const name = document.getElementById('inp-name').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  if (!name || !url) { alert('이름과 URL은 필수예요!'); return; }
  links.push({
    id:'link_'+Date.now(), name, url,
    desc: document.getElementById('inp-desc').value.trim(),
    icon: document.getElementById('inp-icon').value.trim()||'🔗',
    cat: document.getElementById('inp-cat').value,
    color:'#1c1c1c'
  });
  saveLinks(links); render(); closeModal();
}

document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
const now = new Date();
document.getElementById('dateStr').textContent = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
render();
</script>
</body>
