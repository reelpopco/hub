<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 작업 체크리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --card2: #222;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --accent: #c8f542;
    --accent2: #42f5c8;
    --red: #ff4d6d;
    --blue: #4d9fff;
    --purple: #b06dff;
    --orange: #ff9f4d;
    --yellow: #ffd94d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nanum Gothic', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .week-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  .reset-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'Nanum Gothic', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* 전체 진행률 */
  .progress-bar-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
  }

  .progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label { font-size: 12px; color: var(--muted); }
  .progress-pct {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* 채널 카드 */
  .channel-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .channel-card.all-done { border-color: var(--accent); }

  .channel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    gap: 10px;
  }

  .channel-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }

  .ch-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .ch-name {
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ch-tag {
    font-size: 10px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .ch-progress {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .ch-progress.done { color: var(--accent); }

  .channel-body {
    border-top: 1px solid var(--border);
    padding: 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* 아이템 행 */
  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .item-row:hover { background: var(--card2); }
  .item-row.checked { opacity: 0.5; }

  .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-size: 11px;
  }
  .item-row.checked .checkbox {
    border-color: var(--accent);
    background: var(--accent);
    color: #000;
  }

  .item-label {
    font-size: 13px;
    flex: 1;
  }
  .item-row.checked .item-label {
    text-decoration: line-through;
    color: var(--muted);
  }

  .type-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .badge-long { background: rgba(77,159,255,0.15); color: var(--blue); }
  .badge-short { background: rgba(255,77,109,0.15); color: var(--red); }
  .badge-thread { background: rgba(176,109,255,0.15); color: var(--purple); }
  .badge-daily { background: rgba(255,217,77,0.15); color: var(--yellow); }

  /* 스레드 섹션 */
  .thread-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .thread-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .thread-header .ch-name { color: var(--purple); }

  .done-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    background: rgba(200,245,66,0.15);
    color: var(--accent);
    font-weight: 700;
    display: none;
  }
  .channel-card.all-done .done-badge,
  .thread-section.all-done .done-badge { display: inline-block; }

  /* 스크롤 감추기 */
  ::-webkit-scrollbar { display: none; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #444;
    margin-top: 32px;
    font-family: 'Space Mono', monospace;
  }

  /* 완료 축하 */
  .congrats {
    display: none;
    text-align: center;
    padding: 20px;
    font-size: 16px;
    font-weight: 800;
    color: var(--accent);
    animation: pulse 1s infinite alternate;
  }
  @keyframes pulse {
    from { opacity: 0.7; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📋 주간 작업 체크</h1>
    <div class="week-label" id="weekLabel"></div>
  </div>
  <button class="reset-btn" onclick="resetAll()">🔄 초기화</button>
</header>

<div class="progress-bar-wrap">
  <div class="progress-top">
    <span class="progress-label">이번 주 전체 진행률</span>
    <span class="progress-pct" id="totalPct">0%</span>
  </div>
  <div class="bar-bg"><div class="bar-fill" id="totalBar" style="width:0%"></div></div>
</div>

<div id="checklistWrap"></div>

<div class="congrats" id="congrats">🎉 이번 주 모든 작업 완료!</div>

<div class="footer-note">매주 월요일 자동 초기화</div>

<script>
const CHANNELS = [
  {
    id: 'dundum',
    name: '든든백세',
    color: '#4d9fff',
    tag: '월·수·금',
    items: [
      { id: 'dd_l1', label: '롱폼 영상', type: 'long' },
      { id: 'dd_s1', label: '숏츠 1', type: 'short' },
      { id: 'dd_s2', label: '숏츠 2', type: 'short' },
      { id: 'dd_l2', label: '롱폼 영상', type: 'long' },
      { id: 'dd_s3', label: '숏츠 1', type: 'short' },
      { id: 'dd_s4', label: '숏츠 2', type: 'short' },
      { id: 'dd_l3', label: '롱폼 영상', type: 'long' },
      { id: 'dd_s5', label: '숏츠 1', type: 'short' },
      { id: 'dd_s6', label: '숏츠 2', type: 'short' },
    ]
  },
  {
    id: 'eunhye',
    name: '은혜여사',
    color: '#ff9f4d',
    tag: '화·목',
    items: [
      { id: 'eh_l1', label: '롱폼 영상', type: 'long' },
      { id: 'eh_s1', label: '숏츠 1', type: 'short' },
      { id: 'eh_s2', label: '숏츠 2', type: 'short' },
      { id: 'eh_l2', label: '롱폼 영상', type: 'long' },
      { id: 'eh_s3', label: '숏츠 1', type: 'short' },
      { id: 'eh_s4', label: '숏츠 2', type: 'short' },
    ]
  },
  {
    id: 'musicase',
    name: '음악카세',
    color: '#c8f542',
    tag: '주 1회',
    items: [
      { id: 'mu_l1', label: '롱폼 영상', type: 'long' },
      { id: 'mu_s1', label: '숏츠 1', type: 'short' },
      { id: 'mu_s2', label: '숏츠 2', type: 'short' },
    ]
  },
  {
    id: 'moviecaset',
    name: '무비카세',
    color: '#ff4d6d',
    tag: '월 2+롱 / 주 3+숏',
    items: [
      { id: 'mc_l1', label: '롱폼 + 숏츠 세트 1', type: 'long' },
      { id: 'mc_s1', label: '└ 숏츠 1', type: 'short' },
      { id: 'mc_s2', label: '└ 숏츠 2', type: 'short' },
      { id: 'mc_l2', label: '롱폼 + 숏츠 세트 2', type: 'long' },
      { id: 'mc_s3', label: '└ 숏츠 1', type: 'short' },
      { id: 'mc_s4', label: '└ 숏츠 2', type: 'short' },
      { id: 'mc_s5', label: '추가 숏츠', type: 'short' },
    ]
  },
  {
    id: 'dearmovie',
    name: '디어무비',
    color: '#b06dff',
    tag: '월 2+롱 / 주 3+숏',
    items: [
      { id: 'dm_l1', label: '롱폼 + 숏츠 세트 1', type: 'long' },
      { id: 'dm_s1', label: '└ 숏츠 1', type: 'short' },
      { id: 'dm_s2', label: '└ 숏츠 2', type: 'short' },
      { id: 'dm_l2', label: '롱폼 + 숏츠 세트 2', type: 'long' },
      { id: 'dm_s3', label: '└ 숏츠 1', type: 'short' },
      { id: 'dm_s4', label: '└ 숏츠 2', type: 'short' },
      { id: 'dm_s5', label: '추가 숏츠', type: 'short' },
    ]
  }
];

const THREADS = [
  { id: 'th_music', label: '음악카세 스레드', color: '#c8f542' },
  { id: 'th_tarot', label: '타로 스레드', color: '#b06dff' },
];

const DAILY = [
  { id: 'dy_blog_google', label: '구글 블로그 발행', color: '#ff9f4d' },
  { id: 'dy_blog_naver', label: '네이버 블로그 발행', color: '#4dff91' },
];

// 주차 키 계산
function getWeekKey() {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(now.setDate(diff));
  return `week_${monday.getFullYear()}_${monday.getMonth()+1}_${monday.getDate()}`;
}

function getWeekLabel() {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(now);
  mon.setDate(diff);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  return `${mon.getFullYear()} · ${fmt(mon)} – ${fmt(sun)}`;
}

const WEEK_KEY = getWeekKey();

function loadState() {
  try {
    const raw = localStorage.getItem(WEEK_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(WEEK_KEY, JSON.stringify(state));
}

let state = loadState();

function toggle(id) {
  state[id] = !state[id];
  saveState(state);
  render();
}

function resetAll() {
  if (confirm('이번 주 체크를 모두 초기화할까요?')) {
    state = {};
    saveState(state);
    render();
  }
}

function badgeHTML(type) {
  const map = {
    long: ['badge-long', '롱폼'],
    short: ['badge-short', '숏츠'],
    thread: ['badge-thread', '스레드'],
    daily: ['badge-daily', '매일'],
  };
  const [cls, label] = map[type] || ['', ''];
  return `<span class="type-badge ${cls}">${label}</span>`;
}

function render() {
  document.getElementById('weekLabel').textContent = getWeekLabel();

  const wrap = document.getElementById('checklistWrap');
  wrap.innerHTML = '';

  let totalItems = 0, totalDone = 0;

  // 채널 카드
  CHANNELS.forEach(ch => {
    const done = ch.items.filter(i => state[i.id]).length;
    const total = ch.items.length;
    const allDone = done === total;
    totalItems += total;
    totalDone += done;

    const card = document.createElement('div');
    card.className = 'channel-card' + (allDone ? ' all-done' : '');

    const itemsHTML = ch.items.map(item => `
      <div class="item-row ${state[item.id] ? 'checked' : ''}" onclick="toggle('${item.id}')">
        <div class="checkbox">${state[item.id] ? '✓' : ''}</div>
        <span class="item-label">${item.label}</span>
        ${badgeHTML(item.type)}
      </div>
    `).join('');

    card.innerHTML = `
      <div class="channel-header">
        <div class="channel-left">
          <div class="ch-dot" style="background:${ch.color}"></div>
          <span class="ch-name" style="color:${ch.color}">${ch.name}</span>
          <span class="ch-tag">${ch.tag}</span>
        </div>
        <span class="ch-progress ${allDone ? 'done' : ''}">${done}/${total}</span>
        <span class="done-badge">완료 ✓</span>
      </div>
      <div class="channel-body">${itemsHTML}</div>
    `;
    wrap.appendChild(card);
  });

  // 스레드 섹션
  const threadDone = THREADS.filter(t => state[t.id]).length;
  const allThreadDone = threadDone === THREADS.length;
  totalItems += THREADS.length;
  totalDone += threadDone;

  const threadSection = document.createElement('div');
  threadSection.className = 'thread-section channel-card' + (allThreadDone ? ' all-done' : '');

  const threadItemsHTML = THREADS.map(t => `
    <div class="item-row ${state[t.id] ? 'checked' : ''}" onclick="toggle('${t.id}')">
      <div class="checkbox">${state[t.id] ? '✓' : ''}</div>
      <span class="item-label" style="color:${state[t.id] ? '' : t.color}">${t.label}</span>
      ${badgeHTML('daily')}
    </div>
  `).join('');

  threadSection.innerHTML = `
    <div class="channel-header">
      <div class="channel-left">
        <div class="ch-dot" style="background:var(--purple)"></div>
        <span class="ch-name" style="color:var(--purple)">스레드</span>
        <span class="ch-tag">매일 각 1개</span>
      </div>
      <span class="ch-progress ${allThreadDone ? 'done' : ''}">${threadDone}/${THREADS.length}</span>
      <span class="done-badge">완료 ✓</span>
    </div>
    <div class="channel-body">${threadItemsHTML}</div>
  `;
  wrap.appendChild(threadSection);

  // 매일 할일 섹션
  const dailyDone = DAILY.filter(d => state[d.id]).length;
  const allDailyDone = dailyDone === DAILY.length;
  totalItems += DAILY.length;
  totalDone += dailyDone;

  const dailySection = document.createElement('div');
  dailySection.className = 'thread-section channel-card' + (allDailyDone ? ' all-done' : '');

  const dailyItemsHTML = DAILY.map(d => `
    <div class="item-row ${state[d.id] ? 'checked' : ''}" onclick="toggle('${d.id}')">
      <div class="checkbox">${state[d.id] ? '✓' : ''}</div>
      <span class="item-label" style="color:${state[d.id] ? '' : d.color}">${d.label}</span>
      ${badgeHTML('daily')}
    </div>
  `).join('');

  dailySection.innerHTML = `
    <div class="channel-header">
      <div class="channel-left">
        <div class="ch-dot" style="background:var(--orange)"></div>
        <span class="ch-name" style="color:var(--orange)">매일 할일</span>
        <span class="ch-tag">블로그 발행</span>
      </div>
      <span class="ch-progress ${allDailyDone ? 'done' : ''}">${dailyDone}/${DAILY.length}</span>
      <span class="done-badge">완료 ✓</span>
    </div>
    <div class="channel-body">${dailyItemsHTML}</div>
  `;
  wrap.appendChild(dailySection);

  // 전체 진행률
  const pct = totalItems === 0 ? 0 : Math.round((totalDone / totalItems) * 100);
  document.getElementById('totalPct').textContent = pct + '%';
  document.getElementById('totalBar').style.width = pct + '%';

  // 완료 축하
  const congrats = document.getElementById('congrats');
  congrats.style.display = pct === 100 ? 'block' : 'none';
}

render();
</script>
</body>
</html>
